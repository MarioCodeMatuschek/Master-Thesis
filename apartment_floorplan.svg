<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer walls -->
  <rect x="50" y="50" width="700" height="500" fill="white" stroke="black" stroke-width="4"/>
  
  <!-- Horizontal walls with doorways -->
  <line x1="50" y1="250" x2="300" y2="250" stroke="black" stroke-width="3"/>
  <line x1="360" y1="250" x2="400" y2="250" stroke="black" stroke-width="3"/>
  
  <line x1="400" y1="350" x2="520" y2="350" stroke="black" stroke-width="3"/>
  <line x1="580" y1="350" x2="750" y2="350" stroke="black" stroke-width="3"/>
  
  <!-- Vertical walls with doorways -->
  <line x1="400" y1="50" x2="400" y2="200" stroke="black" stroke-width="3"/>
  <line x1="400" y1="260" x2="400" y2="550" stroke="black" stroke-width="3"/>
  
  <line x1="250" y1="250" x2="250" y2="300" stroke="black" stroke-width="3"/>
  <line x1="250" y1="360" x2="250" y2="550" stroke="black" stroke-width="3"/>
  
  <line x1="550" y1="350" x2="550" y2="550" stroke="black" stroke-width="3"/>
  
  <!-- Entry door -->
  <line x1="400" y1="50" x2="450" y2="50" stroke="black" stroke-width="4"/>
  <line x1="510" y1="50" x2="750" y2="50" stroke="black" stroke-width="4"/>
  
  <!-- Windows -->
  <rect x="48" y="150" width="4" height="80" fill="black"/>
  <rect x="600" y="48" width="100" height="4" fill="black"/>
  <rect x="746" y="400" width="4" height="100" fill="black"/>
  <rect x="150" y="546" width="80" height="4" fill="black"/>
</svg>